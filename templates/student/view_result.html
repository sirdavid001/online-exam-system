{% extends 'student/studentbase.html' %}

{% block content %}
<section class="page-head reveal">
  <h2>View Results</h2>
  <p class="page-lead">Open a course to inspect your marks and submission date.</p>
</section>

<div class="table-card reveal">
  <div class="table-head">
    <h6>Course Results</h6>
  </div>
  <div class="table-responsive">
    <table class="table-premium">
      <thead>
        <tr>
          <th>Exam Name</th>
          <th class="text-center">Action</th>
        </tr>
      </thead>
      <tbody>
        {% for t in courses %}
        <tr>
          <td class="font-weight-bold">{{ t.course_name }}</td>
          <td class="text-center">
            <a class="btn-premium py-2 px-3" href="{% url 'check-marks' t.id %}">
              <i class="fas fa-eye mr-2"></i> View Results
            </a>
          </td>
        </tr>
        {% empty %}
        <tr>
          <td class="text-center text-muted" colspan="2">No course results available.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock content %}
