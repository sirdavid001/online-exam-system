{% extends 'exam/adminbase.html' %}

{% block content %}
<section class="page-head reveal">
  <h2>Question Sets</h2>
  <p class="page-lead">Open each course to inspect and manage its question collection.</p>
</section>

<div class="table-card reveal">
  <div class="table-head">
    <h6>Available Question Sets</h6>
  </div>
  <div class="table-responsive">
    <table class="table-premium">
      <thead>
        <tr>
          <th>Course Name</th>
          <th class="text-center">Action</th>
        </tr>
      </thead>
      <tbody>
        {% for c in courses %}
        <tr>
          <td class="font-weight-bold">{{ c.course_name }}</td>
          <td class="text-center">
            <a class="btn-icon-soft" href="{% url 'view-question' c.id %}" title="View Questions">
              <i class="fas fa-eye"></i>
            </a>
          </td>
        </tr>
        {% empty %}
        <tr>
          <td class="text-center text-muted" colspan="2">No question sets available.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock content %}
